<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timekeeper — Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">⏱</div>
      <h1 class="login-title">Timekeeper</h1>
      <p class="login-sub">Sign in to manage your screen time</p>

      <form class="login-form" id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="input" autocomplete="username" autofocus required placeholder="Enter username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="input" autocomplete="current-password" required placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary w-full" id="login-btn">Sign In</button>
        <p class="login-error" id="login-error"></p>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // If already logged in, redirect
    (function () {
      const user = API.getUser();
      if (user && API.getToken()) {
        window.location.href = user.role === 'admin' ? '/admin.html' : '/user.html';
      }
    })();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const data = await API.post('/auth/login', { username, password });
        API.setAuth(data.token, data.user);
        window.location.href = data.user.role === 'admin' ? '/admin.html' : '/user.html';
      } catch (err) {
        errEl.textContent = err.message || 'Login failed. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
